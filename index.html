
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Oxford Online English Academy by Sir Hassan Jatoi. Learn English with confidence through our comprehensive online courses. Admissions Open!">
    <meta name="keywords" content="English Academy, Online English Course, Sir Hassan Jatoi, English Grammar, Spoken English, Admissions Open">
    <meta name="google-site-verification" content="dcf5aa11eb043d8c" />
    <title>Oxford English Academy | Online English Courses by Sir Hassan Jatoi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-gray-100 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">Oxford <span class="text-yellow-600 not-italic">Academy</span></h1>
            <a href="#enroll" class="bg-gray-900 text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-yellow-600 transition">Enroll Now</a>
        </div>
    </nav>

    <section class="max-w-4xl mx-auto px-6 pt-16">
        <div class="bg-white rounded-3xl shadow-lg overflow-hidden border border-gray-100">
            <img src="https://i.ibb.co/j2P2wQb/university-of-oxford1.webp" alt="Cover" class="h-48 w-full object-cover" />
            <div class="px-8 pb-8">
                <div class="-mt-16 mb-4 flex items-end gap-4">
                    <img src="https://i.ibb.co/1fP53Jds/1000020882.png" alt="Sir Hassan Jatoi" class="w-32 h-32 rounded-full border-4 border-white shadow-xl bg-white" />
                    <div class="pb-2">
                        <h2 class="text-2xl font-bold">Sir Hassan Jatoi</h2>
                        <p class="text-yellow-600 font-medium">Director & M.A. English Educator</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-4xl mx-auto px-6 py-16">
        <h2 class="text-3xl font-bold mb-8 text-center">Academy Moments</h2>
        <div class="grid md:grid-cols-3 gap-6">
            <img src="https://i.ibb.co/7JN5mcPF/emotional-multiethnic-students-guys-and-young-ladies-in-graduation-costumes-raising-diplomas-up-and.jpg" alt="Gallery" class="rounded-2xl shadow-md w-full h-48 object-cover" />
            <img src="https://i.ibb.co/gbLnT11z/Shorelight-Associate-Degree.webp" alt="Gallery" class="rounded-2xl shadow-md w-full h-48 object-cover" />
            <img src="https://i.ibb.co/XZH5X6sw/istockphoto-480952865-612x612.jpg" alt="Gallery" class="rounded-2xl shadow-md w-full h-48 object-cover" />
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-6 py-16">
        <h2 class="text-3xl font-bold mb-12 text-center">Complete Course Curriculum</h2>
        <div id="course-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Courses injected via JS -->
        </div>
    </section>

    <section id="enroll" class="max-w-4xl mx-auto px-6 py-16">
        <div class="bg-gray-900 text-white rounded-[2rem] p-8 md:p-12 shadow-2xl">
            <h2 class="text-3xl font-bold mb-2">Registration Form</h2>
            <form id="regForm" class="grid md:grid-cols-2 gap-6 mt-8">
                <input name="name" placeholder="Full Name" required class="p-4 rounded-xl text-gray-900 outline-none" />
                <input name="fatherName" placeholder="Father's Name" required class="p-4 rounded-xl text-gray-900 outline-none" />
                <input name="whatsappNumber" placeholder="WhatsApp Number" required class="p-4 rounded-xl text-gray-900 outline-none" />
                <input name="city" placeholder="City" required class="p-4 rounded-xl text-gray-900 outline-none" />
                <input name="district" placeholder="District" required class="p-4 rounded-xl text-gray-900 outline-none" />
                <input name="lastDegree" placeholder="Last Degree" required class="p-4 rounded-xl text-gray-900 outline-none" />
                <input type="date" name="dob" required class="w-full p-4 rounded-xl text-gray-900 outline-none" />
                <input type="file" accept="image/*,.pdf" class="w-full p-3 bg-white rounded-xl text-gray-500" />
                <button type="submit" class="md:col-span-2 bg-yellow-600 py-4 rounded-xl font-bold text-lg hover:bg-yellow-500 transition">Register Now</button>
            </form>
        </div>
    </section>
    
    <footer class="bg-gray-100 border-t border-gray-200 py-16">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h3 class="text-2xl font-bold mb-8">Connect With Us</h3>
            <div class="flex justify-center gap-6 mb-8">
                <a href="https://wa.me/923083500829" target="_blank" class="bg-[#25D366] text-white px-6 py-3 rounded-full font-bold hover:bg-[#20bd5a] transition">WhatsApp</a>
                <a href="https://www.facebook.com/profile.php?id=61590438282609" target="_blank" class="bg-[#1877F2] text-white px-6 py-3 rounded-full font-bold hover:bg-[#166fe5] transition">Facebook</a>
            </div>
            <p class="text-gray-500 text-sm mb-2">"Learn English Today, Lead Tomorrow."</p>
            <p class="text-gray-400 text-sm">&copy; 2026 Oxford English Academy. Supervised by Sir Hassan Jatoi.</p>
        </div>
    </footer>

    <script>
        const courses = [
            { title: "Course 1: Foundation", items: ["Alphabet & Sounds", "Basic Grammar", "Vocabulary Building", "Parts of Speech"] },
            { title: "Course 2: Grammar Mastery", items: ["All 12 Tenses", "Active & Passive Voice", "Direct & Indirect Speech", "Articles, Modals & Conditionals"] },
            { title: "Course 3: Speaking Skills", items: ["Daily Conversations", "Self Introduction", "Travel & Workplace English", "Spoken Practice"] },
            { title: "Course 4: Writing Skills", items: ["Paragraphs & Essays", "Letters & Emails", "Applications & Reports"] },
            { title: "Course 5: Vocabulary", items: ["Synonyms & Antonyms", "Phrasal Verbs", "Collocations", "One-Word Substitutions"] },
            { title: "Course 6: Advanced English", items: ["Idioms & Proverbs", "Advanced Vocabulary", "Public Speaking", "Interview Preparation"] },
            { title: "Course 7: English for Jobs", items: ["CV & Cover Letter Writing", "Interview Skills", "Professional Communication"] },
            { title: "Course 8: Translation", items: ["Urdu ↔ English Translation", "Sentence & Paragraph Practice"] },
            { title: "Course 9: Pronunciation", items: ["Phonics", "Stress & Accent Training", "Correct Pronunciation"] },
            { title: "Course 10: Fluency Program", items: ["30-Day Speaking Challenge", "Daily Practice", "Group Discussions", "Fluency Assessment"] }
        ];

        const grid = document.getElementById('course-grid');
        courses.forEach(c => {
            grid.innerHTML += `<div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl transition">
                <h3 class="font-bold text-yellow-600 mb-4">${c.title}</h3>
                <ul class="space-y-2 text-sm text-gray-600">
                    ${c.items.map(i => `<li class="flex items-center">✅ ${i}</li>`).join('')}
                </ul>
            </div>`;
        });

        document.getElementById('regForm').onsubmit = (e) => {
            e.preventDefault();
            const f = e.target;
            const msg = `*NEW STUDENT REGISTRATION*\nName: ${f.name.value}\nFather: ${f.fatherName.value}\nWhatsApp: ${f.whatsappNumber.value}\nCity: ${f.city.value}\nDistrict: ${f.district.value}\nLast Degree: ${f.lastDegree.value}\nDOB: ${f.dob.value}`;
            window.open(`https://wa.me/923083500829?text=${encodeURIComponent(msg)}`, '_blank');
        };
    </script>
</body>
</html>
