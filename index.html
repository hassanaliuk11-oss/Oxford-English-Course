<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="description" content="Oxford Online English Academy by Sir Hassan Jatoi. Learn English with confidence through our comprehensive online courses. Admissions Open!">
    <meta name="keywords" content="English Academy, Online English Course, Sir Hassan Jatoi, English Grammar, Spoken English, Admissions Open">
    <title>Oxford English Academy | Online English Courses by Sir Hassan Jatoi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Ensure inputs don't trigger zoom on iOS */
        input, button { font-size: 16px !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-gray-100 px-4 py-3">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold italic">Oxford <span class="text-yellow-600 not-italic">Academy</span></h1>
            <a href="#enroll" class="bg-gray-900 text-white px-4 py-2 rounded-full text-xs font-medium hover:bg-yellow-600 transition">Enroll Now</a>
        </div>
    </nav>

    <section class="max-w-4xl mx-auto px-4 pt-8">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
            <img src="https://i.ibb.co/j2P2wQb/university-of-oxford1.webp" alt="Cover" class="h-40 w-full object-cover" />
            <div class="px-6 pb-6">
                <div class="-mt-12 mb-3 flex items-end gap-3">
                    <img src="https://i.ibb.co/1fP53Jds/1000020882.png" alt="Sir Hassan Jatoi" class="w-24 h-24 rounded-full border-4 border-white shadow-xl bg-white" />
                    <div class="pb-1">
                        <h2 class="text-lg font-bold leading-tight">Sir Hassan Jatoi</h2>
                        <p class="text-yellow-600 text-sm font-medium">Director & Educator</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-4xl mx-auto px-4 py-12">
        <h2 class="text-2xl font-bold mb-6 text-center">Academy Moments</h2>
        <div class="grid grid-cols-2 gap-3">
            <img src="https://i.ibb.co/7JN5mcPF/emotional-multiethnic-students-guys-and-young-ladies-in-graduation-costumes-raising-diplomas-up-and.jpg" alt="Gallery" class="rounded-xl shadow-md w-full h-32 object-cover" />
            <img src="https://i.ibb.co/gbLnT11z/Shorelight-Associate-Degree.webp" alt="Gallery" class="rounded-xl shadow-md w-full h-32 object-cover" />
            <img src="https://i.ibb.co/XZH5X6sw/istockphoto-480952865-612x612.jpg" alt="Gallery" class="col-span-2 rounded-xl shadow-md w-full h-32 object-cover" />
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-4 py-8">
        <h2 class="text-2xl font-bold mb-8 text-center">Course Curriculum</h2>
        <div id="course-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <section id="enroll" class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-gray-900 text-white rounded-3xl p-6 md:p-10 shadow-2xl">
            <h2 class="text-2xl font-bold mb-2">Registration Form</h2>
            <p class="text-gray-400 text-sm mb-6">Fill the form to get started</p>
            <form id="regForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input name="name" placeholder="Full Name" required class="w-full p-4 rounded-xl text-gray-900 outline-none" />
                <input name="fatherName" placeholder="Father's Name" required class="w-full p-4 rounded-xl text-gray-900 outline-none" />
                <input name="whatsappNumber" type="tel" placeholder="WhatsApp Number" required class="w-full p-4 rounded-xl text-gray-900 outline-none" />
                <input name="city" placeholder="City" required class="w-full p-4 rounded-xl text-gray-900 outline-none" />
                <input name="district" placeholder="District" required class="w-full p-4 rounded-xl text-gray-900 outline-none" />
                <input name="lastDegree" placeholder="Last Degree" required class="w-full p-4 rounded-xl text-gray-900 outline-none" />
                <input type="date" name="dob" required class="w-full p-4 rounded-xl text-gray-900 outline-none" />
                <button type="submit" class="md:col-span-2 w-full bg-yellow-600 py-4 rounded-xl font-bold text-white text-lg hover:bg-yellow-500 transition active:scale-95">Register Now</button>
            </form>
        </div>
    </section>
    
    <footer class="bg-gray-100 border-t border-gray-200 py-12">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h3 class="text-xl font-bold mb-6">Connect With Us</h3>
            <div class="flex flex-col gap-3">
                <a href="https://wa.me/923083500829" target="_blank" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold hover:bg-[#20bd5a] transition">WhatsApp Us</a>
                <a href="https://www.facebook.com/profile.php?id=61590438282609" target="_blank" class="w-full bg-[#1877F2] text-white py-4 rounded-xl font-bold hover:bg-[#166fe5] transition">Facebook</a>
            </div>
            <p class="text-gray-500 text-xs mt-8">"Learn English Today, Lead Tomorrow."</p>
            <p class="text-gray-400 text-xs mt-2">&copy; 2026 Oxford English Academy.</p>
        </div>
    </footer>

    <script>
        const courses = [
            { title: "Foundation", items: ["Alphabet & Sounds", "Basic Grammar"] },
            { title: "Grammar Mastery", items: ["All 12 Tenses", "Active/Passive Voice"] },
            { title: "Speaking Skills", items: ["Daily Conversations", "Self Introduction"] },
            { title: "Writing Skills", items: ["Paragraphs & Essays", "Letters & Emails"] },
            { title: "Vocabulary", items: ["Synonyms & Antonyms", "Phrasal Verbs"] },
            { title: "Advanced English", items: ["Idioms & Proverbs", "Public Speaking"] }
        ];

        const grid = document.getElementById('course-grid');
        courses.forEach(c => {
            grid.innerHTML += `<div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                <h3 class="font-bold text-yellow-600 mb-2">${c.title}</h3>
                <ul class="space-y-1 text-sm text-gray-600">
                    ${c.items.map(i => `<li class="flex items-center">✅ ${i}</li>`).join('')}
                </ul>
            </div>`;
        });

        document.getElementById('regForm').onsubmit = (e) => {
            e.preventDefault();
            const f = e.target;
            const msg = `*NEW STUDENT REGISTRATION*\nName: ${f.name.value}\nFather: ${f.fatherName.value}\nWhatsApp: ${f.whatsappNumber.value}\nCity: ${f.city.value}\nDistrict: ${f.district.value}\nLast Degree: ${f.lastDegree.value}\nDOB: ${f.dob.value}`;
            window.open(`https://wa.me/923083500829?text=${encodeURIComponent(msg)}`, '_blank');
        };
    </script>
</body>
</html>
